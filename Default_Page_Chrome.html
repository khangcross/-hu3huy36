<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>New Tab | Chrome</title>
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      background: url("https://raw.githubusercontent.com/khangcross/-hu3huy36/refs/heads/main/wallpaperflare.com_wallpaper.jpg") center/cover no-repeat fixed;
      color: white;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px 30px 0;
      font-size: 10px;
    }

    .greeting {
      text-shadow: 1px 1px 3px #000;
    }

    .right-info {
      text-align: right;
      text-shadow: 1px 1px 3px #000;
      line-height: 1.5;
    }

    #date {
      margin-bottom: 5px;
      font-size: 8px;
    }

    #clock {
      font-size: 10px;
    }



    .shortcuts {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 30px auto;
      text-align: center;
      padding-top: 16cm;
    }

    .shortcuts a {
      text-decoration: none;
      color: white;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 10px;
      font-size: 10px;
      transition: 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .shortcuts a:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="greeting">👋 Xin chào QKhang / Hoàng Huy</div>
    <div class="right-info">
      <div id="date">Thứ 4, ngày 16 tháng 4 năm 2025</div>
      <div id="clock">00:00:00</div>
    </div>
  </div>

  

  <div class="shortcuts">
    <a href="https://facebook.com">Facebook</a>
    <a href="https://twitter.com">Twitter</a>
    <a href="https://www.tiktok.com/">Tiktok</a>
    <a href="https://chat.openai.com">ChatGPT</a>
    <a href="https://docs.google.com/spreadsheets/u/7/d/e/2PACX-1vRlK-vRwPJHDaANT81EjyG4m5ZnLXdKRYfS0eKXyCzGymEfUDmKHRhxvUbtWYTfVn7MJ3E2jk7v3cGi/pubhtml">PITVN</a>
    <a href="https://mail.google.com">Gmail</a>
    <a href="https://drive.google.com">Google Drive</a>
    <a href="https://web.telegram.org/a/">Telegram</a>
    <a href="https://youtube.com">YouTube</a>
    <a href="https://gemini.google.com/app?hl=vi">Gemini</a>
    <a href="https://www.pinterest.com/">Pinterest</a>
    <a href="https://teams.microsoft.com/v2/">MS Team</a>
    <a href="https://codelearn.io/profile/24961385"> Codelearn </a>
    <a href="https://classroom.google.com/u/0/h"> Classroom </a>
    <a href="https://dkhp.itc.edu.vn/"> ITC </a>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const s = now.getSeconds().toString().padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;

      const day = now.getDate();
      const month = now.getMonth() + 1;
      const year = now.getFullYear();
      const weekday = ["Chủ Nhật", "Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"][now.getDay()];
      document.getElementById('date').textContent = `${weekday}, ngày ${day} tháng ${month} năm ${year}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
